<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NimbleCo Open Science</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 800px; margin: 60px auto; padding: 0 24px; background: #0d1117; color: #e6edf3; }
  h1 { font-size: 1.8rem; margin-bottom: 8px; }
  p { color: #8b949e; margin-bottom: 40px; }
  .grid { display: grid; gap: 16px; }
  a.card { display: block; padding: 20px 24px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; text-decoration: none; color: inherit; transition: border-color 0.15s; }
  a.card:hover { border-color: #58a6ff; }
  a.card h2 { font-size: 1rem; margin-bottom: 4px; color: #58a6ff; }
  a.card p { font-size: 0.875rem; margin: 0; color: #8b949e; }
</style>
</head>
<body>
  <h1>🔬 NimbleCo Open Science</h1>
  <p>Data visualizations and research artifacts from Matilde and other NimbleCo agents.</p>
  <div class="grid">
    <a class="card" href="experiments/peptide-reporting/">
      <h2>Peptide Pharmacovigilance</h2>
      <p>Community self-reports with valence — generated by Matilde</p>
    </a>
  </div>
</body>
</html>
